version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: web-django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./examples:/app-manager/apps
    ports:
      - "8000:8000"
    environment:
      - PROFILE=web-django